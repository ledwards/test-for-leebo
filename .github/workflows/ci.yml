name: CI Tests

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch: # Allow manual triggering

jobs:
  test:
    name: Run Tests and QA
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test
        continue-on-error: true
        id: unit-tests

      - name: Run QA tests
        run: npm run qa
        continue-on-error: true
        id: qa-tests

      - name: Upload QA results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: qa-results
          path: src/qa/results.json
          retention-days: 30

      - name: Check test results
        if: steps.unit-tests.outcome == 'failure' || steps.qa-tests.outcome == 'failure'
        run: |
          echo "::warning::Some tests failed. Please review the logs."
          if [ "${{ steps.unit-tests.outcome }}" == "failure" ]; then
            echo "::error::Unit tests failed"
          fi
          if [ "${{ steps.qa-tests.outcome }}" == "failure" ]; then
            echo "::error::QA tests failed"
          fi

      - name: Comment PR with test results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const qaResultsPath = 'src/qa/results.json';

            let comment = '## Test Results\n\n';

            // Unit tests status
            const unitTestsStatus = '${{ steps.unit-tests.outcome }}';
            const unitTestsEmoji = unitTestsStatus === 'success' ? '✅' : '❌';
            comment += `${unitTestsEmoji} **Unit Tests**: ${unitTestsStatus}\n`;

            // QA tests status
            const qaTestsStatus = '${{ steps.qa-tests.outcome }}';
            const qaTestsEmoji = qaTestsStatus === 'success' ? '✅' : '❌';
            comment += `${qaTestsEmoji} **QA Tests**: ${qaTestsStatus}\n\n`;

            // Add QA results if available
            if (fs.existsSync(qaResultsPath)) {
              try {
                const qaResults = JSON.parse(fs.readFileSync(qaResultsPath, 'utf8'));
                comment += '### QA Test Summary\n\n';
                comment += `- **Total Tests**: ${qaResults.summary.total}\n`;
                comment += `- **Passed**: ${qaResults.summary.passed} ✅\n`;
                comment += `- **Failed**: ${qaResults.summary.failed} ❌\n`;

                if (qaResults.summary.failed > 0) {
                  comment += '\n#### Failed Tests\n\n';
                  const failedTests = qaResults.tests.filter(t => t.status === 'failed');
                  failedTests.slice(0, 10).forEach(test => {
                    comment += `- ${test.suite}: ${test.name}\n`;
                  });
                  if (failedTests.length > 10) {
                    comment += `\n... and ${failedTests.length - 10} more\n`;
                  }
                }
              } catch (error) {
                comment += '\n⚠️ Could not parse QA results\n';
              }
            }

            comment += `\n---\n*Workflow run: [#${context.runNumber}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint
        continue-on-error: true
